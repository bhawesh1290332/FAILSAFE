<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAILSAFE — Student Risk Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

    * { box-sizing: border-box; }

    body {
      background: #07040f;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2d9f3;
      margin: 0;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(109, 40, 217, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 90% 80%, rgba(59, 130, 246, 0.10) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 10% 70%, rgba(139, 92, 246, 0.08) 0%, transparent 55%);
    }

    /* Subtle animated grid pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(139, 92, 246, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 92, 246, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d0720; }
    ::-webkit-scrollbar-thumb { background: #5b21b6; border-radius: 4px; }

    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .bar-fill { transition: width 0.6s cubic-bezier(.4,0,.2,1); }

    /* Glassmorphism card base */
    .glass-card {
      background: rgba(255,255,255,0.035);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(139,92,246,0.18);
    }

    /* Glow effects */
    .glow-purple { box-shadow: 0 0 24px rgba(139,92,246,0.15), 0 1px 3px rgba(0,0,0,0.5); }
    .glow-red    { box-shadow: 0 0 20px rgba(239,68,68,0.12), 0 1px 3px rgba(0,0,0,0.5); }
    .glow-green  { box-shadow: 0 0 20px rgba(16,185,129,0.12), 0 1px 3px rgba(0,0,0,0.5); }

    /* Gradient text */
    .grad-text {
      background: linear-gradient(135deg, #c084fc 0%, #818cf8 50%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Upload zone hover pulse */
    .upload-zone:hover { box-shadow: 0 0 32px rgba(139,92,246,0.2); }

    /* Table row hover */
    .student-row:hover { background: rgba(139,92,246,0.07) !important; }

    /* Mono font for data */
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

    /* Stat card accent bar */
    .accent-bar-purple { border-top: 2px solid rgba(139,92,246,0.6); }
    .accent-bar-red    { border-top: 2px solid rgba(239,68,68,0.6); }
    .accent-bar-green  { border-top: 2px solid rgba(16,185,129,0.6); }
    .accent-bar-blue   { border-top: 2px solid rgba(59,130,246,0.5); }

    /* Filter button active */
    .filter-active {
      background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(99,102,241,0.3));
      border-color: rgba(139,92,246,0.5) !important;
      color: #c084fc !important;
    }

    /* Button gradient */
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      box-shadow: 0 4px 15px rgba(124,58,237,0.35);
      transition: all 0.2s;
    }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(124,58,237,0.5); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── API ───────────────────────────────────────────────────────────────────
    const API_BASE = 'http://127.0.0.1:8000';

    // ── Utilities ─────────────────────────────────────────────────────────────
    // teri API probability % deti hai (0-100), convert to 0-1 for display
    const riskColor = (p) =>
        p >= 70 ? { text: 'text-red-400',    bg: 'bg-red-950/40',    border: 'border-red-700/50',    bar: 'bg-gradient-to-r from-red-600 to-red-400'    }
      : p >= 40 ? { text: 'text-amber-400',  bg: 'bg-amber-950/40',  border: 'border-amber-700/50',  bar: 'bg-gradient-to-r from-amber-600 to-amber-400'  }
               : { text: 'text-emerald-400', bg: 'bg-emerald-950/40', border: 'border-emerald-700/50', bar: 'bg-gradient-to-r from-emerald-600 to-emerald-400' };

    const riskLabel = (p) => p >= 70 ? 'HIGH' : p >= 40 ? 'MEDIUM' : 'LOW';
    const pct       = (p) => `${p.toFixed(1)}%`;

    // ── Small components ──────────────────────────────────────────────────────
    function RiskPill({ prob }) {
      const c = riskColor(prob);
      return (
        <span className={`inline-block px-2.5 py-0.5 rounded-full text-xs font-semibold tracking-wide ${c.text} ${c.bg} border ${c.border}`}>
          {riskLabel(prob)}
        </span>
      );
    }

    function RiskBar({ prob }) {
      const c = riskColor(prob);
      return (
        <div className="flex items-center gap-2.5">
          <div className="w-24 bg-white/5 rounded-full h-1.5 overflow-hidden border border-white/5">
            <div className={`${c.bar} h-1.5 rounded-full bar-fill`} style={{ width: `${prob}%` }} />
          </div>
          <span className={`text-sm mono font-medium ${c.text}`}>{pct(prob)}</span>
        </div>
      );
    }

    function StatCard({ label, value, sub, accent }) {
      const bars = {
        default: 'accent-bar-purple',
        red:     'accent-bar-red',
        green:   'accent-bar-green',
        amber:   'accent-bar-blue',
      };
      const texts = {
        default: 'text-violet-200',
        red:     'text-red-400',
        green:   'text-emerald-400',
        amber:   'text-blue-400',
      };
      const bar = bars[accent] || bars.default;
      const txt = texts[accent] || texts.default;
      return (
        <div className={`glass-card glow-purple rounded-xl p-5 ${bar}`}>
          <p className="text-violet-400/60 text-xs uppercase tracking-widest mb-1.5 mono">{label}</p>
          <p className={`text-3xl font-bold mono ${txt}`}>{value}</p>
          {sub && <p className="text-violet-400/40 text-xs mt-1 mono">{sub}</p>}
        </div>
      );
    }

    function Spinner({ text }) {
      return (
        <div className="flex items-center justify-center gap-3 text-violet-400/50 text-sm py-8">
          <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" strokeOpacity="0.25"/>
            <path d="M22 12a10 10 0 00-10-10" stroke="#a855f7" strokeWidth="4" strokeLinecap="round"/>
          </svg>
          {text || 'Loading...'}
        </div>
      );
    }

    // ── SHAP Chart (SVG) ──────────────────────────────────────────────────────
    // teri API: shap_chart_data = [{feature, shap_value}, ...]
    function SHAPChart({ shapData }) {
      const entries = [...shapData]
        .sort((a, b) => Math.abs(b.shap_value) - Math.abs(a.shap_value))
        .slice(0, 12);

      if (!entries.length) return <p className="text-gray-600 text-sm">No SHAP data.</p>;

      const maxAbs = Math.max(...entries.map(d => Math.abs(d.shap_value)), 0.01);
      const rowH = 28, labelW = 130, valW = 64, padX = 10, svgW = 580;
      const chartW = svgW - labelW - valW - padX * 2;
      const center = labelW + chartW / 2;
      const svgH   = entries.length * (rowH + 6) + 32;

      return (
        <svg width="100%" viewBox={`0 0 ${svgW} ${svgH}`} className="overflow-visible">
          <line x1={center} y1={0} x2={center} y2={svgH - 26} stroke="rgba(139,92,246,0.2)" strokeWidth={1.5} strokeDasharray="4 3" />
          {entries.map(({ feature, shap_value }, i) => {
            const y   = i * (rowH + 6) + 2;
            const bw  = (Math.abs(shap_value) / maxAbs) * (chartW / 2 - 6);
            const x   = shap_value >= 0 ? center : center - bw;
            const fill  = shap_value >= 0 ? '#f87171' : '#34d399';
            const tFill = shap_value >= 0 ? '#fca5a5' : '#6ee7b7';
            return (
              <g key={feature}>
                <text x={labelW - 8} y={y + rowH / 2 + 4} textAnchor="end"
                  fill="#a78bfa" fontSize="12" fontFamily="'JetBrains Mono', ui-monospace, monospace">
                  {feature}
                </text>
                <rect x={x} y={y + 5} width={Math.max(bw, 2)} height={rowH - 10}
                  fill={fill} rx={3} opacity={0.8} />
                <text x={svgW - valW + 4} y={y + rowH / 2 + 4} textAnchor="start"
                  fill={tFill} fontSize="11" fontFamily="'JetBrains Mono', ui-monospace, monospace">
                  {shap_value >= 0 ? '+' : ''}{shap_value.toFixed(3)}
                </text>
              </g>
            );
          })}
          <text x={center - chartW / 4} y={svgH - 6} textAnchor="middle" fill="#6d28d9" fontSize="11">Reduces risk</text>
          <text x={center + chartW / 4} y={svgH - 6} textAnchor="middle" fill="#6d28d9" fontSize="11">Increases risk</text>
        </svg>
      );
    }

    // ── UPLOAD VIEW ───────────────────────────────────────────────────────────
    function UploadView({ onDone }) {
      const [file, setFile]         = useState(null);
      const [loading, setLoading]   = useState(false);
      const [error, setError]       = useState(null);
      const [dragging, setDragging] = useState(false);
      const inputRef = useRef();

      const handleFile = (f) => {
        if (!f) return;
        if (!f.name.toLowerCase().endsWith('.csv')) { setError('Please select a .csv file.'); return; }
        setFile(f); setError(null);
      };

      const handleUpload = async () => {
        if (!file) return;
        setLoading(true); setError(null);
        const fd = new FormData(); fd.append('file', file);
        try {
          // Step 1: fast predict for dashboard summary
          const r1 = await fetch(`${API_BASE}/predict`, { method: 'POST', body: fd });
          if (!r1.ok) { const e = await r1.json().catch(()=>({})); throw new Error(e.detail || `Error ${r1.status}`); }
          const predict = await r1.json();

          // Step 2: interventions + SHAP (slower)
          const fd2 = new FormData(); fd2.append('file', file);
          const r2 = await fetch(`${API_BASE}/interventions`, { method: 'POST', body: fd2 });
          if (!r2.ok) { const e = await r2.json().catch(()=>({})); throw new Error(e.detail || `Error ${r2.status}`); }
          const interventions = await r2.json();

          onDone({ predict, interventions });
        } catch (e) {
          setError(e.message || 'Connection failed — is backend running on port 8000?');
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-8 fade-in">

          {/* Logo area */}
          <div className="text-center mb-10">
            <div className="inline-flex items-center gap-3 mb-4">
              <div style={{width:'42px',height:'42px',borderRadius:'10px',background:'linear-gradient(135deg,#7c3aed,#4f46e5)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 24px rgba(124,58,237,0.5)'}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
              </div>
              <h1 className="text-5xl font-black tracking-tight grad-text">FAILSAFE</h1>
            </div>
            <p className="text-violet-300/70 mt-1 text-base">Early Student Failure Risk Detection System</p>
            <p className="text-violet-400/40 text-sm mt-1.5 mono">
              Ankit &nbsp;&middot;&nbsp; Vaidik &nbsp;&middot;&nbsp; Bhawesh &nbsp;&middot;&nbsp; IIT Guwahati
            </p>
          </div>

          <div className="w-full max-w-md">
            <div
              onDrop={(e) => { e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files[0]); }}
              onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
              onDragLeave={() => setDragging(false)}
              onClick={() => inputRef.current.click()}
              className={`upload-zone border-2 border-dashed rounded-2xl p-12 text-center cursor-pointer select-none transition-all duration-300
                ${file ? 'border-emerald-500/60 bg-emerald-950/20 shadow-lg shadow-emerald-900/20'
                : dragging ? 'border-violet-500/70 bg-violet-950/20 shadow-lg shadow-violet-900/30'
                : 'border-violet-700/30 bg-white/[0.025] hover:border-violet-500/50'}`}
              style={{backdropFilter:'blur(12px)'}}
            >
              <input ref={inputRef} type="file" accept=".csv" className="hidden"
                onChange={(e) => handleFile(e.target.files[0])} />
              {file ? (
                <>
                  <div style={{width:'44px',height:'44px',borderRadius:'50%',background:'rgba(16,185,129,0.15)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',border:'1px solid rgba(16,185,129,0.3)'}}>
                    <svg className="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                    </svg>
                  </div>
                  <p className="text-emerald-400 font-semibold">{file.name}</p>
                  <p className="text-emerald-400/50 text-sm mt-1 mono">{(file.size / 1024).toFixed(1)} KB</p>
                </>
              ) : (
                <>
                  <div style={{width:'44px',height:'44px',borderRadius:'50%',background:'rgba(139,92,246,0.1)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',border:'1px solid rgba(139,92,246,0.2)'}}>
                    <svg className="w-6 h-6 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                  </div>
                  <p className="text-violet-200/80 font-medium">Drop student CSV here</p>
                  <p className="text-violet-400/40 text-sm mt-1">or click to browse</p>
                  <p className="text-violet-400/25 text-xs mt-3 mono">student-mat.csv &nbsp; student-por.csv</p>
                </>
              )}
            </div>

            {error && <p className="mt-3 text-red-400 text-sm text-center px-2">{error}</p>}

            <button
              onClick={handleUpload}
              disabled={!file || loading}
              className="mt-4 w-full py-3.5 rounded-xl font-semibold text-white text-sm tracking-wide btn-primary"
            >
              {loading ? (
                <span className="flex items-center justify-center gap-2">
                  <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="white" strokeWidth="4" strokeOpacity="0.25"/>
                    <path d="M22 12a10 10 0 00-10-10" stroke="white" strokeWidth="4" strokeLinecap="round"/>
                  </svg>
                  Analysing... (SHAP may take 20–30s)
                </span>
              ) : 'Upload and Analyse'}
            </button>

            <p className="text-violet-400/30 text-xs text-center mt-4 mono">
              Required columns: school · sex · age · absences · failures · studytime
            </p>
          </div>
        </div>
      );
    }

    // ── DASHBOARD VIEW ────────────────────────────────────────────────────────
    function DashboardView({ data, onSelect, onNewUpload }) {
      const [search, setSearch] = useState('');
      const [filter, setFilter] = useState('all');

      const { predict, interventions } = data;

      // Merge predict + interventions by student_index
      const merged = predict.predictions.map(p => {
        const iv = interventions.interventions.find(i => i.student_index === p.student_index) || {};
        return { ...p, ...iv };
      });

      const high = merged.filter(s => s.risk_level === 'HIGH').length;
      const med  = merged.filter(s => s.risk_level === 'MEDIUM').length;
      const low  = merged.filter(s => s.risk_level === 'LOW').length;
      const avgRisk = merged.reduce((a, s) => a + s.risk_probability, 0) / merged.length;

      const students = merged
        .filter(s => filter === 'atrisk' ? s.at_risk === 'YES' : filter === 'safe' ? s.at_risk === 'NO' : true)
        .filter(s => `student_${s.student_index}`.includes(search.toLowerCase()) || search === '')
        .sort((a, b) => b.risk_probability - a.risk_probability);

      return (
        <div className="min-h-screen p-6 max-w-6xl mx-auto fade-in">

          {/* Header */}
          <div className="flex items-center justify-between mb-8">
            <div>
              <div className="flex items-center gap-2.5 mb-1">
                <div style={{width:'28px',height:'28px',borderRadius:'7px',background:'linear-gradient(135deg,#7c3aed,#4f46e5)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 12px rgba(124,58,237,0.4)'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                  </svg>
                </div>
                <h1 className="text-2xl font-bold tracking-tight grad-text">FAILSAFE — Risk Dashboard</h1>
              </div>
              <p className="text-violet-400/40 text-sm mono">
                {predict.total_students} students analysed &nbsp;&middot;&nbsp;{' '}
                {new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}
              </p>
            </div>
            <div className="flex gap-2">
              <button
                onClick={() => {
                  alert('Use the Batch Report download: go back and use /batch-report endpoint directly, or re-upload on the new upload screen.');
                }}
                className="px-4 py-2 rounded-lg text-sm text-violet-400/60 border border-violet-700/30 hover:border-violet-500/50 hover:text-violet-200 transition-all"
              >
                Export CSV
              </button>
              <button
                onClick={onNewUpload}
                className="px-4 py-2 rounded-lg text-sm text-violet-400/60 border border-violet-700/30 hover:border-violet-500/50 hover:text-violet-200 transition-all"
              >
                New upload
              </button>
            </div>
          </div>

          {/* Stat cards */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
            <StatCard label="Total Students"    value={predict.total_students} />
            <StatCard label="At Risk"           value={predict.at_risk_count}
              sub={`${((predict.at_risk_count / predict.total_students) * 100).toFixed(1)}% of class`} accent="red" />
            <StatCard label="Safe"              value={predict.safe_count}
              sub={`${((predict.safe_count / predict.total_students) * 100).toFixed(1)}% of class`} accent="green" />
            <StatCard label="Avg Risk Score"    value={`${avgRisk.toFixed(1)}%`} />
          </div>

          {/* Risk distribution */}
          <div className="glass-card glow-purple rounded-xl p-5 mb-5">
            <p className="text-violet-400/50 text-xs uppercase tracking-widest mb-4 mono">Risk Distribution</p>
            <div className="space-y-3">
              {[
                { label: 'High    ≥70%', count: high, bar: 'bg-gradient-to-r from-red-600 to-red-400',     text: 'text-red-400'     },
                { label: 'Medium 40-69%', count: med, bar: 'bg-gradient-to-r from-amber-600 to-amber-400',   text: 'text-amber-400'   },
                { label: 'Low     <40%',  count: low, bar: 'bg-gradient-to-r from-emerald-600 to-emerald-400', text: 'text-emerald-400' },
              ].map(({ label, count, bar, text }) => (
                <div key={label} className="flex items-center gap-3">
                  <span className="text-violet-400/40 text-xs mono w-32 shrink-0">{label}</span>
                  <div className="flex-1 bg-white/5 rounded-full h-1.5 overflow-hidden border border-white/5">
                    <div className={`${bar} h-1.5 rounded-full bar-fill`}
                      style={{ width: `${(count / predict.total_students) * 100}%` }} />
                  </div>
                  <span className={`${text} text-xs mono w-24 text-right shrink-0`}>
                    {count} &nbsp;({((count / predict.total_students) * 100).toFixed(1)}%)
                  </span>
                </div>
              ))}
            </div>
          </div>

          {/* Table */}
          <div className="glass-card glow-purple rounded-xl overflow-hidden">
            <div className="p-4 border-b border-violet-700/20 flex flex-wrap items-center gap-3">
              <input
                className="flex-1 min-w-40 bg-white/5 border border-violet-700/30 rounded-lg px-3 py-1.5
                  text-sm text-violet-200 placeholder-violet-400/30 focus:outline-none focus:border-violet-500/60 transition-colors mono"
                placeholder="Search by student index..."
                value={search}
                onChange={(e) => setSearch(e.target.value)}
              />
              <div className="flex gap-1">
                {[['all','All'],['atrisk','At Risk'],['safe','Safe']].map(([f, label]) => (
                  <button key={f} onClick={() => setFilter(f)}
                    className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all border ${
                      filter === f
                        ? 'filter-active border-violet-500/40'
                        : 'text-violet-400/50 border-transparent hover:text-violet-200'
                    }`}>
                    {label}
                  </button>
                ))}
              </div>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="text-violet-400/40 text-xs uppercase tracking-widest border-b border-violet-700/20">
                    <th className="px-5 py-3 text-left font-medium mono">Student</th>
                    <th className="px-5 py-3 text-left font-medium mono">Risk Score</th>
                    <th className="px-5 py-3 text-left font-medium mono">Level</th>
                    <th className="px-5 py-3 text-left font-medium mono">Interventions</th>
                    <th className="px-5 py-3"></th>
                  </tr>
                </thead>
                <tbody>
                  {students.map((s) => (
                    <tr key={s.student_index}
                      onClick={() => onSelect(s.student_index)}
                      className="student-row border-b border-violet-700/10 cursor-pointer transition-colors group">
                      <td className="px-5 py-3.5 mono text-sm text-violet-200">
                        Student #{s.student_index}
                      </td>
                      <td className="px-5 py-3.5"><RiskBar prob={s.risk_probability} /></td>
                      <td className="px-5 py-3.5"><RiskPill prob={s.risk_probability} /></td>
                      <td className="px-5 py-3.5 text-violet-400/40 text-sm">
                        {s.at_risk === 'YES'
                          ? `${(s.interventions || []).length} intervention${(s.interventions||[]).length !== 1 ? 's' : ''}`
                          : 'Monitoring only'}
                      </td>
                      <td className="px-5 py-3.5 text-right text-violet-700/50 group-hover:text-violet-400 transition-colors text-sm mono">
                        View →
                      </td>
                    </tr>
                  ))}
                  {students.length === 0 && (
                    <tr>
                      <td colSpan={5} className="px-5 py-12 text-center text-violet-400/30 text-sm">
                        No students match the current filter.
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
            <div className="px-5 py-3 border-t border-violet-700/20 text-violet-400/30 text-xs mono">
              Showing {students.length} of {predict.total_students} students
            </div>
          </div>
        </div>
      );
    }

    // ── STUDENT DETAIL VIEW ───────────────────────────────────────────────────
    function StudentDetailView({ studentIndex, allData, onBack }) {
      // Pull from cached interventions data (no extra API call needed)
      const s = allData.interventions.interventions.find(i => i.student_index === studentIndex);
      const p = allData.predict.predictions.find(i => i.student_index === studentIndex);

      if (!s || !p) return (
        <div className="min-h-screen flex flex-col items-center justify-center gap-4">
          <p className="text-red-400 text-sm">Student data not found.</p>
          <button onClick={onBack} className="text-violet-400/60 hover:text-violet-200 text-sm transition-colors">
            Back to dashboard
          </button>
        </div>
      );

      const c      = riskColor(s.risk_probability);
      const RISK_KEYS = ['failures','absences','studytime','Dalc','Walc','goout','health','famsup','schoolsup','freetime'];

      return (
        <div className="min-h-screen p-6 max-w-4xl mx-auto fade-in">

          {/* Back */}
          <button onClick={onBack}
            className="flex items-center gap-1.5 text-violet-400/50 hover:text-violet-200 mb-6 text-sm transition-colors">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
            </svg>
            Back to Dashboard
          </button>

          {/* Header */}
          <div className="flex items-start justify-between gap-4 mb-6">
            <div>
              <p className="text-violet-400/40 text-xs uppercase tracking-widest mb-1 mono">Student Report</p>
              <h1 className="text-4xl font-black mono grad-text">Student #{s.student_index}</h1>
            </div>
            <div className={`text-right px-6 py-4 rounded-xl border ${c.border} ${c.bg} glass-card`}>
              <p className={`text-4xl font-black mono ${c.text}`}>{s.risk_probability.toFixed(1)}%</p>
              <p className={`text-xs font-semibold tracking-widest mt-1 uppercase ${c.text}`}>
                {s.at_risk === 'YES' ? 'At Risk' : 'Safe'}
              </p>
            </div>
          </div>

          {/* SHAP chart */}
          <div className="glass-card glow-purple rounded-xl p-6 mb-5">
            <p className="text-violet-400/50 text-xs uppercase tracking-widest mb-1 mono">Feature Contributions</p>
            <p className="text-violet-400/30 text-xs mb-5">
              What pushed this student's predicted risk score up or down
            </p>
            <SHAPChart shapData={s.shap_chart_data} />
            <p className="text-violet-400/25 text-xs mt-4 text-center mono">
              Red bars increase predicted risk &nbsp;&middot;&nbsp; Green bars reduce it
            </p>
          </div>

          {/* Interventions */}
          <div className={`glass-card rounded-xl p-6 mb-5 ${s.at_risk === 'YES' ? 'border-red-700/40 glow-red' : 'glow-purple'}`}>
            <p className={`text-xs uppercase tracking-widest mb-4 mono ${s.at_risk === 'YES' ? 'text-red-400' : 'text-violet-400/50'}`}>
              {s.at_risk === 'YES' ? 'Recommended Interventions' : 'Monitoring Recommendations'}
            </p>
            {(s.interventions || []).length === 0
              ? <p className="text-violet-400/40 text-sm">No interventions needed — student is low risk.</p>
              : (s.interventions || []).map((iv, i) => (
                  <div key={i} className="flex gap-3 items-start mb-3">
                    <span className={`mono text-sm mt-0.5 shrink-0 ${s.at_risk === 'YES' ? 'text-red-600' : 'text-violet-500/50'}`}>
                      {i + 1}.
                    </span>
                    <div>
                      <p className="text-violet-100/80 text-sm leading-relaxed">{iv.intervention}</p>
                      <p className="text-violet-400/30 text-xs mt-0.5 mono">
                        {iv.feature} &nbsp;·&nbsp; SHAP: +{iv.shap_impact} &nbsp;·&nbsp; Priority: {iv.priority}
                      </p>
                    </div>
                  </div>
                ))
            }
          </div>

          {/* Top SHAP features as tiles */}
          <div className="glass-card glow-purple rounded-xl p-6">
            <p className="text-violet-400/50 text-xs uppercase tracking-widest mb-4 mono">Top Risk Factors</p>
            <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
              {s.shap_chart_data.slice(0, 10).map(({ feature, shap_value }) => {
                const isRisk = shap_value > 0;
                return (
                  <div key={feature}
                    className={`rounded-lg p-3 border transition-all ${isRisk ? 'border-red-700/40 bg-red-950/30' : 'border-violet-700/20 bg-white/[0.02]'}`}>
                    <p className="text-violet-400/40 text-xs mono">{feature}</p>
                    <p className={`mono font-bold text-lg mt-0.5 ${isRisk ? 'text-red-400' : 'text-emerald-400'}`}>
                      {shap_value >= 0 ? '+' : ''}{shap_value.toFixed(3)}
                    </p>
                  </div>
                );
              })}
            </div>
          </div>

        </div>
      );
    }

    // ── APP ROOT ──────────────────────────────────────────────────────────────
    function App() {
      const [view,      setView]      = useState('upload');
      const [allData,   setAllData]   = useState(null);
      const [selectedIdx, setSelectedIdx] = useState(null);

      const handleDone   = useCallback((data) => { setAllData(data); setView('dashboard'); }, []);
      const handleSelect = useCallback((idx)  => { setSelectedIdx(idx); setView('student'); }, []);

      if (view === 'upload')    return <UploadView onDone={handleDone} />;
      if (view === 'dashboard') return <DashboardView data={allData} onSelect={handleSelect} onNewUpload={() => setView('upload')} />;
      if (view === 'student')   return <StudentDetailView studentIndex={selectedIdx} allData={allData} onBack={() => setView('dashboard')} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
